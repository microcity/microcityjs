<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>排队仿真 - Worker + tinyqueue + Three.js</title>
		<style>
			:root {
				color-scheme: light;
			}

			body {
				margin: 0;
				font-family: Arial, sans-serif;
				background: #f3f4f6;
			}

			.app {
				padding: 16px;
				display: grid;
				gap: 12px;
			}

			.panel {
				background: #ffffff;
				border-radius: 8px;
				padding: 12px;
				box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
			}

			.controls {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
				gap: 10px;
				align-items: end;
			}

			.field {
				display: grid;
				gap: 6px;
			}

			label {
				font-size: 13px;
			}

			input {
				border: 1px solid #d1d5db;
				border-radius: 6px;
				padding: 8px;
				font-size: 14px;
			}

			button {
				height: 36px;
				border: 0;
				border-radius: 6px;
				background: #2563eb;
				color: white;
				cursor: pointer;
			}

			button:hover {
				background: #1d4ed8;
			}

			#status {
				margin-top: 8px;
				font-size: 13px;
			}

			#sceneWrap {
				width: 100%;
				height: 540px;
				border: 1px solid #d1d5db;
				border-radius: 8px;
				overflow: hidden;
				background: #111827;
			}

			#simCanvas {
				width: 100%;
				height: 100%;
				display: block;
			}
		</style>
	</head>
	<body>
		<div class="app">
			<div class="panel">
				<div class="controls">
					<div class="field">
						<label for="arrivalRate">到达率 λ（每单位时间）</label>
						<input id="arrivalRate" type="number" min="0.1" step="0.1" value="1.8" />
					</div>
					<div class="field">
						<label for="serviceRate">服务率 μ（每单位时间）</label>
						<input id="serviceRate" type="number" min="0.1" step="0.1" value="2.2" />
					</div>
					<div class="field">
						<label for="queueCapacity">最大排队长度</label>
						<input id="queueCapacity" type="number" min="1" step="1" value="12" />
					</div>
					<div class="field">
						<label for="duration">仿真时长</label>
						<input id="duration" type="number" min="5" step="1" value="60" />
					</div>
					<button id="playBtn" type="button">播放仿真</button>
				</div>
				<div id="status">状态：等待开始</div>
			</div>

			<div class="panel">
				<div id="sceneWrap">
					<canvas id="simCanvas"></canvas>
				</div>
			</div>
		</div>

		<script type="module">
			import * as Comlink from 'https://esm.sh/comlink';

			const playBtn = document.getElementById('playBtn');
			const statusEl = document.getElementById('status');
			const sceneWrap = document.getElementById('sceneWrap');

			const controls = {
				arrivalRate: document.getElementById('arrivalRate'),
				serviceRate: document.getElementById('serviceRate'),
				queueCapacity: document.getElementById('queueCapacity'),
				duration: document.getElementById('duration')
			};

			let simWorker = null;
			let renderWorker = null;
			let simApi = null;
			let renderApi = null;
			let canvasEl = document.getElementById('simCanvas');
			let detachMouseBridge = null;

			function setStatus(text) {
				statusEl.textContent = `状态：${text}`;
			}

			function recreateCanvas() {
				const nextCanvas = document.createElement('canvas');
				nextCanvas.id = 'simCanvas';
				sceneWrap.replaceChildren(nextCanvas);
				canvasEl = nextCanvas;
			}

			function readConfig() {
				return {
					arrivalRate: Number(controls.arrivalRate.value),
					serviceRate: Number(controls.serviceRate.value),
					queueCapacity: Number(controls.queueCapacity.value),
					duration: Number(controls.duration.value)
				};
			}

			function postResize() {
				if (!renderApi || !canvasEl) return;
				const rect = sceneWrap.getBoundingClientRect();
				renderApi.resize(
					Math.max(1, Math.floor(rect.width)),
					Math.max(1, Math.floor(rect.height))
				);
			}

			function bindMouseBridge(activeRenderApi) {
				if (detachMouseBridge) {
					detachMouseBridge();
					detachMouseBridge = null;
				}

				let lastX = 0;
				let lastY = 0;

				const onMouseDown = (event) => {
					lastX = event.clientX;
					lastY = event.clientY;
				};

				const onMouseMove = (event) => {
					if (!activeRenderApi || event.buttons === 0) {
						lastX = event.clientX;
						lastY = event.clientY;
						return;
					}

					const deltaX = event.clientX - lastX;
					const deltaY = event.clientY - lastY;
					lastX = event.clientX;
					lastY = event.clientY;

					activeRenderApi.onMouseMove({
						deltax: deltaX,
						deltay: deltaY,
						buttons: event.buttons
					});
				};

				const onWheel = (event) => {
					if (!activeRenderApi) return;
					event.preventDefault();
					activeRenderApi.onMouseWheel({
						deltaY: event.deltaY
					});
				};

				const onContextMenu = (event) => {
					event.preventDefault();
				};

				sceneWrap.addEventListener('mousedown', onMouseDown);
				sceneWrap.addEventListener('mousemove', onMouseMove);
				sceneWrap.addEventListener('wheel', onWheel, { passive: false });
				sceneWrap.addEventListener('contextmenu', onContextMenu);

				detachMouseBridge = () => {
					sceneWrap.removeEventListener('mousedown', onMouseDown);
					sceneWrap.removeEventListener('mousemove', onMouseMove);
					sceneWrap.removeEventListener('wheel', onWheel);
					sceneWrap.removeEventListener('contextmenu', onContextMenu);
				};
			}

			async function startDualWorkers() {
				if (simWorker || renderWorker) {
					if (detachMouseBridge) {
						detachMouseBridge();
						detachMouseBridge = null;
					}
					simWorker?.terminate();
					renderWorker?.terminate();
					simWorker = null;
					renderWorker = null;
					simApi = null;
					renderApi = null;
				}

				recreateCanvas();

				const config = readConfig();
				const rect = sceneWrap.getBoundingClientRect();

				const offscreen = canvasEl.transferControlToOffscreen();
				simWorker = new Worker('./sim-worker.js', { type: 'module' });
				renderWorker = new Worker('./render-worker.js', { type: 'module' });

				simWorker.onerror = (event) => {
					const detail = [event.filename, event.lineno, event.colno]
						.filter((item) => item !== undefined && item !== null && String(item).length > 0)
						.join(':');
					setStatus(`Worker错误：${event.message || '未知错误'}${detail ? ` (${detail})` : ''}`);
				};
				renderWorker.onerror = (event) => {
					const detail = [event.filename, event.lineno, event.colno]
						.filter((item) => item !== undefined && item !== null && String(item).length > 0)
						.join(':');
					setStatus(`Worker错误：${event.message || '未知错误'}${detail ? ` (${detail})` : ''}`);
				};

				simWorker.onmessageerror = () => {
					setStatus('仿真Worker消息解析失败');
				};
				renderWorker.onmessageerror = () => {
					setStatus('Worker消息解析失败');
				};

				simApi = Comlink.wrap(simWorker);
				renderApi = Comlink.wrap(renderWorker);

				const channel = new MessageChannel();
				await simApi.connectRenderPort(Comlink.transfer(channel.port1, [channel.port1]));
				await renderApi.connectSimPort(Comlink.transfer(channel.port2, [channel.port2]));

				const renderInfo = await renderApi.init(
					Comlink.transfer(offscreen, [offscreen]),
					Math.max(1, Math.floor(rect.width)),
					Math.max(1, Math.floor(rect.height))
				);

				bindMouseBridge(renderApi);

				await simApi.start(
					config,
					Comlink.proxy({
						onStatus(text) {
							setStatus(text);
						},
						onStats(msg) {
							setStatus(`运行中 | t=${msg.simTime.toFixed(2)} 到达=${msg.arrived} 完成=${msg.served} 丢弃=${msg.dropped} 队列=${msg.queueLength}`);
						},
						onDone(msg) {
							setStatus(`结束 | t=${msg.simTime.toFixed(2)} 到达=${msg.arrived} 完成=${msg.served} 丢弃=${msg.dropped}`);
						},
						onError(message) {
							setStatus(`错误：${message}`);
						}
					})
				);

				setStatus(`双Worker初始化完成（${renderInfo?.backend || '未知后端'}），仿真运行中`);
			}

			playBtn.addEventListener('click', () => {
				startDualWorkers().catch((error) => {
					setStatus(`启动失败：${error?.message || String(error)}`);
				});
			});

			window.addEventListener('resize', postResize);
		</script>
	</body>
</html>
