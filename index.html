<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文档驱动仿真 (DDS)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; overflow: hidden; height: 100vh; }
  #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  canvas { width: 100%; height: 100%; display: block; }
  #controls {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    background: rgba(20, 20, 40, 0.85); border-radius: 8px; padding: 12px 16px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.1);
  }
  #controls label { font-size: 13px; display: flex; align-items: center; gap: 4px; }
  #controls input[type="number"],
  #controls input[type="range"] { background: #2a2a4a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; padding: 2px 6px; width: 70px; }
  #controls input[type="range"] { width: 100px; }
  #controls button {
    padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: background 0.2s;
  }
  #btn-start { background: #4caf50; color: #fff; }
  #btn-start:hover { background: #66bb6a; }
  #btn-start.running { background: #f44336; }
  #btn-start.running:hover { background: #ef5350; }
  #status { position: absolute; bottom: 12px; left: 12px; z-index: 10; font-size: 12px; color: #aaa; }
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="render-canvas"></canvas>
</div>

<div id="controls">
  <button id="btn-start">启动仿真</button>
  <label>速度
    <input id="sim-speed" type="range" min="0.1" max="20" step="0.1" value="5">
    <span id="speed-val">5×</span>
  </label>
  <label>时长(s)
    <input id="sim-duration" type="number" min="1" max="86400" value="300">
  </label>
</div>

<div id="status">就绪</div>

<script type="module">
import * as Comlink from "https://unpkg.com/comlink@4.4.2/dist/esm/comlink.mjs";

// ── DOM 元素 ──
const canvas     = document.getElementById("render-canvas");
const btnStart   = document.getElementById("btn-start");
const inpSpeed   = document.getElementById("sim-speed");
const spanSpeed  = document.getElementById("speed-val");
const inpDur     = document.getElementById("sim-duration");
const statusEl   = document.getElementById("status");

// ── OffscreenCanvas ──
const offscreen = canvas.transferControlToOffscreen();

// ── 创建 Workers ──
const desRaw = new Worker("code/des_worker.js", { type: "module" });
const tdrRaw = new Worker("code/3dr_worker.js", { type: "module" });
const desWorker = Comlink.wrap(desRaw);
const tdrWorker = Comlink.wrap(tdrRaw);

// ── 建立 MessageChannel（仿真帧 DES → 3DR）──
const frameChannel = new MessageChannel();
desRaw.postMessage({ type: "frame-port", port: frameChannel.port1 }, [frameChannel.port1]);
tdrRaw.postMessage({ type: "frame-port", port: frameChannel.port2 }, [frameChannel.port2]);

// ── 初始化渲染 Worker（传递 OffscreenCanvas）──
await tdrWorker.init(Comlink.transfer(offscreen, [offscreen]), window.innerWidth, window.innerHeight);

// ── 鼠标 / 触控事件桥接到渲染 Worker ──
function bridgePointerEvents() {
  let pointerDown = false;
  let lastX = 0, lastY = 0;
  let button = 0;

  canvas.addEventListener("pointerdown", (e) => {
    pointerDown = true;
    lastX = e.clientX;
    lastY = e.clientY;
    button = e.button;
    canvas.setPointerCapture(e.pointerId);
  });

  window.addEventListener("pointermove", (e) => {
    if (!pointerDown) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;
    tdrWorker.onPointerMove(dx, dy, button);
  });

  window.addEventListener("pointerup", () => { pointerDown = false; });

  canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    tdrWorker.onWheel(e.deltaY);
  }, { passive: false });
}
bridgePointerEvents();

// ── 窗口缩放 ──
window.addEventListener("resize", () => {
  tdrWorker.resize(window.innerWidth, window.innerHeight);
});

// ── 仿真运行状态 ──
let running = false;

// 状态回调：仿真 Worker 通过 Comlink 回调通知主线程
desRaw.addEventListener("message", (e) => {
  if (e.data && e.data.type === "status") {
    statusEl.textContent = e.data.text;
  }
  if (e.data && e.data.type === "done") {
    running = false;
    btnStart.textContent = "启动仿真";
    btnStart.classList.remove("running");
    statusEl.textContent = "仿真完成";
  }
});

// ── 速度滑块 ──
inpSpeed.addEventListener("input", () => {
  const v = parseFloat(inpSpeed.value);
  spanSpeed.textContent = v + "×";
  if (running) desWorker.setSpeed(v);
});

// ── 启动 / 停止 ──
btnStart.addEventListener("click", async () => {
  if (!running) {
    running = true;
    btnStart.textContent = "停止仿真";
    btnStart.classList.add("running");
    const speed    = parseFloat(inpSpeed.value);
    const duration = parseFloat(inpDur.value);
    await desWorker.start({ speed, duration });
  } else {
    running = false;
    btnStart.textContent = "启动仿真";
    btnStart.classList.remove("running");
    await desWorker.stop();
    statusEl.textContent = "已停止";
  }
});
</script>
</body>
</html>
